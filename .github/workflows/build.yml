name: Build PC Shadows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Memberikan izin nulis/push ke bot GitHub Actions
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r25c
      
      - name: Build
        run: |
          ${{ steps.ndk.outputs.ndk-path }}/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=./jni/Android.mk NDK_APPLICATION_MK=./jni/Application.mk -j$(nproc)
      
      - name: Simpan .so ke dalam folder repo (Auto-Commit)
        run: |
          mkdir -p release
          cp libs/armeabi-v7a/libshadowpc.so release/
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add release/libshadowpc.so
          # Pakai [skip ci] biar gak terjadi infinite loop build
          git commit -m "Auto-build: update libshadowpc.so [skip ci]" || echo "Tidak ada perubahan, skip commit"
          git push
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libshadowpc-arm32
          path: libs/armeabi-v7a/libshadowpc.so
